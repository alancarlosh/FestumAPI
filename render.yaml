services:
  - type: web
    name: festum-api
    env: python
    plan: starter
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    disk:
      name: festum-uploads
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: API_V1_PREFIX
        value: /api/v1
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: S3_PRESIGNED_TTL_SECONDS
        value: "1800"
      - key: ORDER_CURRENCY
        value: MXN
      - key: ORDER_FEE_RATE
        value: "0.05"
      - key: ORDER_TAX_RATE
        value: "0.16"
      - key: JWT_SECRET_KEY
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false
      - key: FIREBASE_DATABASE_URL
        sync: false
      - key: FIREBASE_STORAGE_BUCKET
        sync: false
      - key: IMAGE_STORAGE_BACKEND
        value: local
      - key: LOCAL_STORAGE_PATH
        value: /var/data/uploads
      - key: MEDIA_PUBLIC_PATH
        value: /media
      - key: LOCAL_PUBLIC_BASE_URL
        value: https://festum-api.onrender.com/media
      - key: ALLOWED_ORIGINS
        sync: false
