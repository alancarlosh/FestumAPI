services:
  - type: web
    name: festum-api
    env: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: API_V1_PREFIX
        value: /api/v1
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: S3_PRESIGNED_TTL_SECONDS
        value: "1800"
      - key: ORDER_CURRENCY
        value: MXN
      - key: ORDER_FEE_RATE
        value: "0.05"
      - key: ORDER_TAX_RATE
        value: "0.16"
      - key: JWT_SECRET_KEY
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false
      - key: FIREBASE_DATABASE_URL
        sync: false
      - key: FIREBASE_STORAGE_BUCKET
        sync: false
      - key: AWS_REGION
        sync: false
      - key: S3_BUCKET_NAME
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: S3_PUBLIC_BASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
